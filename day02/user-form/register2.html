<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>User Registration Form2</title>
</head>

<body>
<h1>User Registration2</h1>
<form action="#" method="POST">

<div>
    <label for="name">사용자의 이름:</label>
    <input type="text" id="name" name="name">
</div>

<div>
    <label for="email">사용자의 이메일 주소:</label>
    <input type="email" id="email" name="email">
</div>

<div>
    <label for="password">비밀번호:</label>
    <input type="password" id="password" name="password">
</div>

<div>
    <label for="birth">생년월일:</label>
    <input type="date" id="birth" name="birth">
</div>

<div>
    <label for="age">나이:</label>
    <input type="number" id="age" name="age" min="18" max="100">
</div>

<div>
    <label for="satisfaction">서비스 만족도:</label>
    <input type="range" id="satisfaction" name="satisfaction" min="1" max="10">
</div>

<div>
    성별:
    <label><input type="radio" name="gender" value="male"> 남성</label>
    <label><input type="radio" name="gender" value="female"> 여성</label>
    <label><input type="radio" name="gender" value="other"> 기타</label>
</div>

<div>
    취미:
    <label><input type="checkbox" name="hobby" value="홀덤"> 홀덤</label>
    <label><input type="checkbox" name="hobby" value="피아노"> 피아노</label>
    <label><input type="checkbox" name="hobby" value="바베큐"> 바베큐</label>
</div>

<div>
    <label for="country">국가:</label>
    <select id="country" name="country">
        <option value="South korea">South korea</option>
        <option value="USA">USA</option>
        <option value="Japan">Japan</option>
        <option value="China">China</option>
        <option value="UK">UK</option>
    </select>
</div>

<div>
    <button type="submit">제출</button>
    <button type="reset">초기화</button>
</div>

</form>
</body>
